vich_uploader:
    db_driver: orm

    mappings:

        music_file:
            uri_prefix: /uploads/music
            upload_destination: '%kernel.project_dir%/public/uploads/music'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        music_image:
            uri_prefix: /uploads/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        
        album_image:
            uri_prefix: /uploads/albums
            upload_destination: '%kernel.project_dir%/public/uploads/albums'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer