cgu:
  title: "Conditions Générales d’Utilisation"
  last_update: "Dernière mise à jour :"
  heading: "📝 Conditions Générales d’Utilisation (CGU)"
  section1:
    title: "Objectif de la Plateforme"
    content: >
      Cette plateforme met en relation la diaspora capverdienne avec les commerçants locaux
      au Cap-Vert. Les membres de la diaspora peuvent acheter des produits pour leurs proches.
      Ces produits sont retirés localement ou livrés aux bénéficiaires
      via nos partenaires.
  section2:
    title: "Accès au Service"
    item1: "Inscription gratuite avec création d’un compte utilisateur"
    item2: "Acceptation obligatoire des présentes Conditions Générales"
    item3: "Fourniture d’informations exactes et à jour"
  section3:
    title: "Fonctionnement des Commandes"
    item1: "Choix des produits auprès des commerçants"
    item2: "Paiement en ligne via un système sécurisé"
    item3: "Retrait ou livraison des produits au Cap-Vert"
  section4:
    title: "Rôle de la Plateforme"
    content: >
      La plateforme agit en tant qu’intermédiaire.
      Les commerçants sont responsables de la qualité,
      de la disponibilité et de la livraison des produits.
  section5:
    title: "Engagements des Utilisateurs"
    item1: "Utilisation honnête et conforme à la législation en vigueur"
    item2: "Interdiction des comptes fictifs ou activités frauduleuses"
    item3: "Respect des autres utilisateurs et des commerçants"
  section6:
    title: "Paiement et Sécurité"
    content: >
      Tous les paiements sont traités par des prestataires certifiés.
      Aucune information bancaire n’est stockée sur nos serveurs.
  section7:
    title: "Livraison / Retrait"
    content: >
      Le mode de retrait dépend du commerçant (livraison ou retrait).
      Les détails sont affichés avant le paiement.
  section8:
    title: "Responsabilité"
    content: >
      La plateforme ne saurait être tenue responsable des retards,
      ruptures de stock ou litiges directs avec les commerçants.
      Toutefois, nous restons disponibles pour accompagner la résolution des conflits.
  section9:
    title: "Protection des Données"
    content: >
      Vos données personnelles sont protégées conformément à la réglementation en vigueur (RGPD).
      Consultez notre Politique de Confidentialité pour plus de détails.
  section10:
    title: "Modification des Conditions"
    content: >
      Nous nous réservons le droit de modifier ces conditions à tout moment.
      Les utilisateurs seront informés en cas de changements importants.
  section11:
    title: "Contact"
    content: "Pour toute question ou suggestion :"
  accept:
    text: >
      En utilisant notre plateforme, vous acceptez pleinement et sans réserve ces conditions.
    thanks: "Merci pour votre confiance."


# -------------------privacy----------------------------------
privacy:
  title: "Politique de Confidentialité"
  heading: "🔒 Politique de Confidentialité"
  last_update: "Dernière mise à jour :"

  section1:
    title: "Introduction"
    content: >
      Cette politique de confidentialité explique comment nous collectons,
      utilisons, stockons et protégeons vos données personnelles
      lorsque vous utilisez notre plateforme.

  section2:
    title: "Données collectées"
    intro: "Nous collectons les informations suivantes :"
    item1: "Nom et prénom"
    item2: "Adresse e-mail"
    item3: "Adresse postale (livraison ou facturation)"
    item4: "Historique des commandes"
    item5: "Données de navigation (cookies, si acceptés)"

  section3:
    title: "Utilisation des données"
    intro: "Vos données sont utilisées pour :"
    item1: "Créer et gérer votre compte utilisateur"
    item2: "Assurer le bon fonctionnement des commandes et livraisons"
    item3: "Améliorer notre plateforme et nos services"
    item4: "Communiquer avec vous (confirmations, notifications, support client)"

  section4:
    title: "Partage des données"
    content: >
      Vos données personnelles sont partagées uniquement avec les prestataires
      nécessaires à l’exécution des services (paiement, livraison).
      Aucune donnée n’est vendue à des tiers.

  section5:
    title: "Sécurité"
    content: >
      Nous mettons en œuvre toutes les mesures techniques et organisationnelles
      nécessaires pour protéger vos données contre tout accès non autorisé,
      perte ou destruction.

  section6:
    title: "Durée de conservation"
    content: >
      Vos données sont conservées tant que votre compte est actif
      et jusqu’à 3 ans après votre dernière activité.

  section7:
    title: "Vos droits"
    intro: "Conformément au RGPD, vous disposez des droits suivants :"
    item1: "Accès à vos données personnelles"
    item2: "Rectification ou mise à jour de vos informations"
    item3: "Suppression de votre compte et de vos données"
