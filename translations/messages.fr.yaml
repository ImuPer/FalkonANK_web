about.title: "À propos de nous"
button.back_to_shop: "Retour à la boutique"
about.paragraph1: "Nous sommes une organisation basée à Paris, France, créée par la diaspora capverdienne dans le but de renforcer la connexion entre la communauté capverdienne à l'étranger et les commerçants locaux au Cap-Vert. Notre site e-commerce est conçu pour faciliter le commerce direct entre les membres de la diaspora et les vendeurs locaux, offrant une expérience d'achat unique à nos clients."
about.paragraph2: "Nous nous concentrons principalement sur le secteur alimentaire, permettant à la diaspora capverdienne d'acheter directement auprès des commerçants locaux au Cap-Vert. Notre système permet aux clients de faire des achats et d’instruire leurs proches ou destinataires à récupérer les produits dans les points de vente, ou d’opter pour une livraison à domicile, offrant plus de commodité et de flexibilité."
about.paragraph3: "Notre engagement est envers la qualité, l'authenticité et le soutien à l'économie locale, favorisant la croissance et le développement du commerce au Cap-Vert grâce à une plateforme numérique innovante et accessible."
about.image_alt: "Image À propos de nous"

