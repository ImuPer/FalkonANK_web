cgu:
  title: "Condições Gerais de Utilização"
  last_update: "Última atualização:"
  heading: "📝 Condições Gerais de Utilização (CGU)"
  section1:
    title: "Objetivo da Plataforma"
    content: >
      Esta plataforma conecta a diáspora cabo-verdiana com os comerciantes locais
      em Cabo Verde. Os membros da diáspora podem comprar produtos para os seus familiares no país.
      Estes produtos serão levantados localmente ou entregues aos beneficiários
      através dos nossos parceiros.
  section2:
    title: "Acesso ao Serviço"
    item1: "Inscrição gratuita com criação de conta de utilizador"
    item2: "Aceitação obrigatória destas Condições Gerais"
    item3: "Fornecimento de informações corretas e atualizadas"
  section3:
    title: "Funcionamento das Encomendas"
    item1: "Escolha dos produtos junto dos comerciantes"
    item2: "Pagamento online através de um sistema seguro"
    item3: "Levantamento ou entrega dos produtos em Cabo Verde"
  section4:
    title: "Papel da Plataforma"
    content: >
      A plataforma atua como intermediária.
      Os comerciantes são responsáveis pela qualidade,
      disponibilidade e entrega dos produtos.
  section5:
    title: "Compromissos dos Utilizadores"
    item1: "Utilização honesta e conforme à legislação em vigor"
    item2: "Proibição de contas falsas ou atividades fraudulentas"
    item3: "Respeito pelos outros utilizadores e comerciantes"
  section6:
    title: "Pagamento e Segurança"
    content: >
      Todos os pagamentos são processados por prestadores certificados.
      Nenhuma informação bancária é armazenada nos nossos servidores.
  section7:
    title: "Entrega / Levantamento"
    content: >
      O método de levantamento depende do comerciante (entrega ou levantamento).
      Os detalhes são apresentados antes do pagamento.
  section8:
    title: "Responsabilidade"
    content: >
      A plataforma não se responsabiliza por atrasos,
      ruturas de stock ou litígios diretos com o comerciante.
      No entanto, estamos disponíveis para ajudar na resolução de conflitos.
  section9:
    title: "Proteção de Dados"
    content: >
      Os seus dados pessoais são protegidos de acordo com a legislação em vigor (RGPD).
      Consulte a nossa Política de Privacidade para mais informações.
  section10:
    title: "Alterações das Condições"
    content: >
      Reservamo-nos o direito de alterar estas condições a qualquer momento.
      Os utilizadores serão notificados em caso de alterações importantes.
  section11:
    title: "Contacto"
    content: "Para qualquer questão ou sugestão:"
  accept:
    text: >
      Ao utilizar a nossa plataforma, aceita integralmente e sem reservas estas condições.
    thanks: "Obrigado pela sua confiança."

# ----------------privacy-------------------------------------------------------------------------------
privacy:
  title: "Política de Privacidade"
  heading: "🔒 Política de Privacidade"
  last_update: "Última atualização:"

  section1:
    title: "Introdução"
    content: "Esta política de privacidade explica como coletamos, usamos, armazenamos e protegemos seus dados pessoais quando você utiliza nossa plataforma."

  section2:
    title: "Dados Coletados"
    intro: "Coletamos as seguintes informações:"
    item1: "Nome e sobrenome"
    item2: "Endereço de e-mail"
    item3: "Endereço postal (entrega ou faturamento)"
    item4: "Histórico de pedidos"
    item5: "Dados de navegação (cookies, se aceitos)"

  section3:
    title: "Uso dos Dados"
    intro: "Seus dados são utilizados para:"
    item1: "Criar e gerenciar sua conta"
    item2: "Garantir o funcionamento dos pedidos e entregas"
    item3: "Melhorar a plataforma e os serviços"
    item4: "Comunicação com o usuário"

  section4:
    title: "Compartilhamento de Dados"
    content: "Os dados são compartilhados apenas com prestadores necessários (pagamento, entrega). Nenhuma informação é vendida a terceiros."

  section5:
    title: "Segurança"
    content: "Aplicamos medidas técnicas e organizacionais para proteger seus dados."

