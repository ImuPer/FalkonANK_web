about.title: "Sobre Nós"
button.back_to_shop: "Voltar à loja"
about.paragraph1: "Somos uma organização sediada em Paris, França, criada pela diáspora cabo-verdiana com o objetivo de fortalecer a conexão entre a comunidade cabo-verdiana no exterior e os comerciantes locais em Cabo Verde. Nosso site e-commerce foi projetado para facilitar o comércio direto entre os membros da diáspora e os vendedores locais, promovendo uma experiência única de compras para nossos clientes."
about.paragraph2: "Focamos principalmente no setor alimentar, permitindo que a diáspora cabo-verdiana compre produtos diretamente de comerciantes locais em Cabo Verde. Nosso sistema possibilita que os clientes façam compras e instruam seus familiares ou destinatários a irem buscar os produtos nos pontos de venda, ou optem por uma entrega ao domicílio, garantindo maior conveniência e flexibilidade."
about.paragraph3: "O nosso compromisso é com a qualidade, a autenticidade e o apoio à economia local, promovendo o crescimento e desenvolvimento do comércio em Cabo Verde através de uma plataforma digital inovadora e acessível."
