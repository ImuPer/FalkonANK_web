about.title: "Sobre Nosotros"
button.back_to_shop: "Volver a la tienda"
about.paragraph1: "Somos una organización con sede en París, Francia, creada por la diáspora caboverdiana con el objetivo de fortalecer la conexión entre la comunidad caboverdiana en el extranjero y los comerciantes locales en Cabo Verde. Nuestro sitio de comercio electrónico está diseñado para facilitar el comercio directo entre los miembros de la diáspora y los vendedores locales, proporcionando una experiencia de compra única a nuestros clientes."
about.paragraph2: "Nos centramos principalmente en el sector alimentario, permitiendo que la diáspora caboverdiana compre productos directamente de los comerciantes locales en Cabo Verde. Nuestro sistema permite a los clientes comprar e instruir a sus familiares o destinatarios para recoger los productos en los puntos de venta, o elegir la entrega a domicilio, garantizando mayor comodidad y flexibilidad."
about.paragraph3: "Nuestro compromiso es con la calidad, la autenticidad y el apoyo a la economía local, promoviendo el crecimiento y desarrollo del comercio en Cabo Verde a través de una plataforma digital innovadora y accesible."
