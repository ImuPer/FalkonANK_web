cgu:
  title: "Términos y Condiciones de Uso"
  last_update: "Última actualización:"
  heading: "📝 Términos y Condiciones de Uso (TCU)"
  section1:
    title: "Objetivo de la Plataforma"
    content: >
      Esta plataforma conecta a la diáspora caboverdiana con los comerciantes locales
      en Cabo Verde. Los miembros de la diáspora pueden comprar productos para sus familiares.
      Los productos se recogen localmente o se entregan a los beneficiarios
      a través de nuestros socios.
  section2:
    title: "Acceso al Servicio"
    item1: "Registro gratuito con creación de cuenta de usuario"
    item2: "Aceptación obligatoria de estos Términos y Condiciones"
    item3: "Proporcionar información correcta y actualizada"
  section3:
    title: "Funcionamiento de los Pedidos"
    item1: "Selección de productos de los comerciantes"
    item2: "Pago en línea mediante un sistema seguro"
    item3: "Recogida o entrega de productos en Cabo Verde"
  section4:
    title: "Papel de la Plataforma"
    content: >
      La plataforma actúa como intermediaria.
      Los comerciantes son responsables de la calidad,
      disponibilidad y entrega de los productos.
  section5:
    title: "Compromisos de los Usuarios"
    item1: "Uso honesto y conforme a la ley"
    item2: "Prohibición de cuentas falsas o actividades fraudulentas"
    item3: "Respeto hacia otros usuarios y comerciantes"
  section6:
    title: "Pago y Seguridad"
    content: >
      Todos los pagos son procesados por proveedores certificados.
      Ninguna información bancaria se almacena en nuestros servidores.
  section7:
    title: "Entrega / Recogida"
    content: >
      El método de recogida depende del comerciante (entrega o recogida).
      Los detalles se muestran antes del pago.
  section8:
    title: "Responsabilidad"
    content: >
      La plataforma no se responsabiliza por retrasos,
      falta de stock o disputas directas con el comerciante.
      Sin embargo, estamos disponibles para ayudar a resolver cualquier conflicto.
  section9:
    title: "Protección de Datos"
    content: >
      Sus datos personales están protegidos conforme a la legislación vigente (RGPD).
      Consulte nuestra Política de Privacidad para más detalles.
  section10:
    title: "Modificaciones de los Términos"
    content: >
      Nos reservamos el derecho de modificar estos términos en cualquier momento.
      Se notificará a los usuarios en caso de cambios importantes.
  section11:
    title: "Contacto"
    content: "Para cualquier consulta o sugerencia:"
  accept:
    text: >
      Al utilizar nuestra plataforma, acepta plenamente estos términos.
    thanks: "Gracias por su confianza."


# -------------------Privacy----------------------------------
privacy:
  title: "Política de Privacidad"
  heading: "🔒 Política de Privacidad"
  last_update: "Última actualización:"

  section1:
    title: "Introducción"
    content: >
      Esta política de privacidad explica cómo recopilamos, utilizamos,
      almacenamos y protegemos sus datos personales cuando utiliza nuestra plataforma.

  section2:
    title: "Datos Recopilados"
    intro: "Recopilamos la siguiente información:"
    item1: "Nombre y apellido"
    item2: "Dirección de correo electrónico"
    item3: "Dirección postal (entrega o facturación)"
    item4: "Historial de pedidos"
    item5: "Datos de navegación (cookies, si se aceptan)"

  section3:
    title: "Uso de los Datos"
    intro: "Sus datos se utilizan para:"
    item1: "Crear y gestionar su cuenta de usuario"
    item2: "Garantizar el correcto funcionamiento de los pedidos y entregas"
    item3: "Mejorar nuestra plataforma y servicios"
    item4: "Comunicarnos con usted (confirmaciones, notificaciones, soporte al cliente)"

  section4:
    title: "Compartición de Datos"
    content: >
      Sus datos personales se comparten únicamente con los proveedores
      necesarios para la ejecución de los servicios (pago, entrega).
      No se venden datos a terceros.

  section5:
    title: "Seguridad"
    content: >
      Implementamos todas las medidas técnicas y organizativas necesarias
      para proteger sus datos contra accesos no autorizados, pérdida o destrucción.

  section6:
    title: "Conservación de Datos"
    content: >
      Sus datos se conservarán mientras su cuenta esté activa
      y hasta 3 años después de su última actividad.

  section7:
    title: "Sus Derechos"
